<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dr. Sarah Hamdy Rashedy</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#0f172a,#1e3a8a);
    padding:20px;
}

.card{
    width:420px;
    background:#fff;
    border-radius:25px;
    padding:35px;
    text-align:center;
    box-shadow:0 15px 40px rgba(0,0,0,.3);
}

.profile-img{
    width:180px;
    height:180px;
    margin:auto;
    border-radius:50%;
    overflow:hidden;
    border:5px solid #2563eb;
    box-shadow:0 5px 20px rgba(37,99,235,.4);
}

.profile-img img{
    width:100%;
    height:100%;
    object-fit:cover;
}

h1{
    margin-top:20px;
    color:#0f172a;
    font-size:2rem;
}

.position{
    margin-top:10px;
    color:#2563eb;
    font-weight:bold;
    font-size:1.2rem;
}

.institute{
    margin-top:10px;
    color:#555;
    line-height:1.6;
}

.email{
    margin-top:15px;
    font-weight:bold;
}

.buttons{
    margin-top:25px;
    display:flex;
    flex-direction:column;
    gap:12px;
}

.btn{
    background:#2563eb;
    color:white;
    text-decoration:none;
    padding:14px;
    border-radius:12px;
    font-weight:bold;
    transition:.3s;
}

.btn:hover{
    background:#1d4ed8;
    transform:scale(1.03);
}

.footer{
    margin-top:20px;
    color:#777;
}
</style>
</head>

<body>

<div class="card">

    <div class="profile-img">
        <img src="sarah.jpg" alt="Dr. Sarah Hamdy Rashedy">
    </div>

    <h1>Dr. Sarah Hamdy Rashedy</h1>

    <p class="position">Assistant Professor</p>

    <p class="institute">
        National Institute of Oceanography and Fisheries (NIOF), Egypt
    </p>

    <p class="email">
        📧 sarahamdy.niof@gmail.com
    </p>

    <div class="buttons">
        <a class="btn" href="https://www.linkedin.com/in/dr-sarah-hamdy-135b9079/" target="_blank">
            LinkedIn
        </a>

        <a class="btn" href="https://scholar.google.com.eg/citations?hl=en&user=BglUXn0AAAAJ" target="_blank">
            Google Scholar
        </a>

        <a class="btn" href="https://www.researchgate.net/profile/Sarah-Rashedy" target="_blank">
            ResearchGate
        </a>
    </div>

    <div class="footer">
        Academic Profile
    </div>

</div>

<script>
console.log("Academic Profile Loaded Successfully");
</script>

</body>
</html>

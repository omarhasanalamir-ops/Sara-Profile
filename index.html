<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dr. Sarah Hamdy Rashedy</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: Arial, sans-serif;
}

body{
    background: linear-gradient(135deg,#0f172a,#1e3a8a);
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    padding:20px;
}

.card{
    background:white;
    width:400px;
    border-radius:20px;
    padding:30px;
    text-align:center;
    box-shadow:0 10px 30px rgba(0,0,0,0.3);
}

.profile-img{
    width:120px;
    height:120px;
    border-radius:50%;
    margin:auto;
    background:#dbeafe;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:50px;
}

h1{
    margin-top:15px;
    color:#0f172a;
}

.position{
    color:#2563eb;
    font-weight:bold;
    margin-top:10px;
}

.institute{
    color:#555;
    margin-top:8px;
}

.email{
    margin-top:15px;
    color:#333;
}

.buttons{
    margin-top:25px;
    display:flex;
    flex-direction:column;
    gap:12px;
}

.btn{
    text-decoration:none;
    background:#2563eb;
    color:white;
    padding:12px;
    border-radius:10px;
    transition:.3s;
}

.btn:hover{
    background:#1d4ed8;
}

.footer{
    margin-top:20px;
    color:#777;
    font-size:14px;
}
</style>
</head>

<body>

<div class="card">

    <div class="profile-img">
        👩‍🔬
    </div>

    <h1>Dr. Sarah Hamdy Rashedy</h1>

    <p class="position">
        Assistant Professor
    </p>

    <p class="institute">
        National Institute of Oceanography and Fisheries (NIOF), Egypt
    </p>

    <p class="email">
        📧 sarahamdy.niof@gmail.com
    </p>

    <div class="buttons">

        <a class="btn"
        href="https://www.linkedin.com/in/dr-sarah-hamdy-135b9079/"
        target="_blank">
        LinkedIn
        </a>

        <a class="btn"
        href="https://scholar.google.com.eg/citations?hl=en&user=BglUXn0AAAAJ"
        target="_blank">
        Google Scholar
        </a>

        <a class="btn"
        href="https://www.researchgate.net/profile/Sarah-Rashedy"
        target="_blank">
        ResearchGate
        </a>

    </div>

    <div class="footer">
        Academic Profile
    </div>

</div>

<script>
console.log("Academic Profile Loaded");
</script>

</body>
</html>
